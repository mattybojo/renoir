<ion-header class="header-margin">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="saveItem()"
        ><ion-icon name="save"></ion-icon
      ></ion-button>
    </ion-buttons>
    <ion-title class="ion-text-center">{{ title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="modal.dismiss()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-list>
    <ion-item>
      <ion-label class="input-label">Name</ion-label>
      <ion-input [(ngModel)]="modalItem.name"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label class="input-label">Quantity</ion-label>
      <ion-input [(ngModel)]="modalItem.quantity"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label class="input-label">Shopped?</ion-label>
      <ion-checkbox slot="end" [(ngModel)]="modalItem.isShopped"></ion-checkbox>
    </ion-item>
  </ion-list>
</ion-content>
