<ren-header></ren-header>
<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let item of shoppingList" #slidingItem>
      <ion-item>
        <ion-label>{{item.name}}</ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option
          color="primary"
          (click)="updateItem(item, slidingItem)"
          class="btn-item-option"
          ><ion-icon name="pencil"></ion-icon
        ></ion-item-option>
        <ion-item-option
          color="danger"
          (click)="deleteItem(item)"
          class="btn-item-option"
          ><ion-icon name="trash"></ion-icon
        ></ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
