<ren-header></ren-header>
<ion-content>
  <ion-item>
    <ion-label class="input-label">Cost of item #1</ion-label>
    <ion-input
      clearInput
      type="number"
      placeholder="Cost"
      inputmode="numeric"
      [(ngModel)]="costItem1"
      (ionChange)="onInputChange()"
    ></ion-input>
  </ion-item>
  <ion-item class="item-spacing">
    <ion-label class="input-label">Quantity of item #1</ion-label>
    <ion-input
      clearInput
      type="number"
      placeholder="lb, oz, etc"
      inputmode="numeric"
      [(ngModel)]="qtyItem1"
      (ionChange)="onInputChange()"
    ></ion-input>
  </ion-item>
  <ion-item>
    <ion-label class="input-label">Cost of item #2</ion-label>
    <ion-input
      clearInput
      type="number"
      placeholder="Cost"
      inputmode="numeric"
      [(ngModel)]="costItem2"
      (ionChange)="onInputChange()"
    ></ion-input>
  </ion-item>
  <ion-item class="item-spacing">
    <ion-label class="input-label">Quantity of item #2</ion-label>
    <ion-input
      clearInput
      type="number"
      placeholder="lb, oz, etc"
      inputmode="numeric"
      [(ngModel)]="qtyItem2"
      (ionChange)="onInputChange()"
    ></ion-input>
  </ion-item>
  <ion-item>
    <ion-label>Item 1</ion-label>
    <ion-label text-end class="item2">Item 2</ion-label>
  </ion-item>
  <ion-item>
    <ion-label [ngClass]="priceClass1"
      >{{ priceItem1 | currency: 'USD' }}</ion-label
    >
    <ion-label text-end class="item2" [ngClass]="priceClass2"
      >{{ priceItem2 | currency: 'USD' }}</ion-label
    >
  </ion-item>
</ion-content>
