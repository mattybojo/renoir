<ren-header
  [actions]="headerActions"
  (actionType)="actionHandler($event)"
></ren-header>
<ion-content>
  <ren-filter-sort
    [sortSettings]="sortSettings"
    [pickerOptions]="pickerOptions"
    [filterSettings]="filterSettings"
    [items]="giftCardList"
    (exportedItems)="filteredGiftCardList=$event"
  ></ren-filter-sort>
  <ion-list *ngIf="filteredGiftCardList?.length > 0; else noDataFound">
    <ion-item-sliding *ngFor="let giftCard of giftCardList">
      <ion-item button (click)="updateItem(giftCard)">
        <ion-label>
          <span class="ion-float-left">
            {{ giftCard.storeName }} ({{ giftCard.last4 | number: '4.0-0' |
            noComma }})
          </span>
          <span class="ion-float-right">
            {{ giftCard.amount | currency: 'USD' }}
          </span>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option
          color="primary"
          (click)="updateItem(giftCard)"
          class="btn-item-option"
          ><ion-icon name="pencil"></ion-icon
        ></ion-item-option>
        <ion-item-option
          color="danger"
          (click)="deleteItem(giftCard)"
          class="btn-item-option"
          ><ion-icon name="trash"></ion-icon
        ></ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
  <ng-template #noDataFound>
    <ion-grid class="h-100">
      <ion-row class="ion-justify-content-center ion-align-items-center h-100">
        <ion-item class="ion-align-self-center">
          The gift card list is empty.
        </ion-item>
      </ion-row>
    </ion-grid>
  </ng-template>
</ion-content>
