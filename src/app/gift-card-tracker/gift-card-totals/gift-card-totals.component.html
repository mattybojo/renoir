<ren-header
  [actions]="headerActions"
  (actionType)="actionHandler($event)"
></ren-header>
<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col
        col-6
        (click)="onHeaderClick(col.param)"
        *ngFor="let col of tableColumns"
        ><ion-item class="text-center"
          ><ion-label class="font-bold mr-1.5">
            {{ col.label }}
            <ren-sort-order-caret
              [param]="col.param"
              [sortParam]="sortParam"
              [sortOrder]="sortOrder"
            ></ren-sort-order-caret>
          </ion-label>
        </ion-item>
      </ion-col>
    </ion-row>
    <ion-row *ngFor="let data of giftCardTotals">
      <ion-col col-6 class="text-center">{{ data.storeName }}</ion-col>
      <ion-col col-6 class="text-center">{{
        data.amount | currency: "USD"
      }}</ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
