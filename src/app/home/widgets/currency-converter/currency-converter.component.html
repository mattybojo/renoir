<ion-card>
  <ion-item>
    <ion-icon name="cash-outline" slot="start"></ion-icon>
    <ion-label>Currency Converter</ion-label>
    <ion-button fill="outline" slot="end" (click)="convertCurrency()"
      >Convert</ion-button
    >
  </ion-item>
  <ion-card-content>
    <ion-grid>
      <ion-row>
        <ion-col size="8">
          <ion-select
            ok-text="Select"
            cancel-text="Cancel"
            placeholder="Currency"
            [(ngModel)]="fromCurrency"
          >
            <ng-container *ngFor="let opt of currencyOpts">
              <ion-select-option [value]="opt.value">{{
                opt.label
              }}</ion-select-option>
            </ng-container>
          </ion-select>
        </ion-col>
        <ion-col>
          <ion-input
            clearInput
            type="number"
            placeholder="Amount"
            inputmode="decimal"
            [(ngModel)]="amount1"
          ></ion-input>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="8">
          <ion-select
            ok-text="Select"
            cancel-text="Cancel"
            placeholder="Currency"
            [(ngModel)]="toCurrency"
          >
            <ng-container *ngFor="let opt of currencyOpts">
              <ion-select-option [value]="opt.value">{{
                opt.label
              }}</ion-select-option>
            </ng-container>
          </ion-select>
        </ion-col>
        <ion-col class="d-flex ion-align-items-center">
          <ion-label>{{ amount2 | number: "1.2-2" }}</ion-label>
        </ion-col>
      </ion-row>
      <ion-row *ngIf="rateData" class="ion-justify-content-center">
        <ion-text>
          <p>1 {{ fromCurrency }} = {{ rateData.rate }} {{ toCurrency }}</p>
        </ion-text>
      </ion-row>
    </ion-grid>
  </ion-card-content>
</ion-card>
