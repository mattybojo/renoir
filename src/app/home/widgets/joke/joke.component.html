<ion-card>
  <ion-item>
    <ion-icon name="happy-outline" slot="start"></ion-icon>
    <ion-label>Joke</ion-label>
    <ion-button fill="outline" slot="end" (click)="getNewJoke()"
      >New Joke</ion-button
    >
  </ion-item>
  <ion-card-content>
    <ng-container *ngIf="isLoading; else jokeLoaded">
      <ion-skeleton-text
        [animated]="true"
        class="w-52 bg-step100"
      ></ion-skeleton-text>
      <ion-skeleton-text
        [animated]="true"
        class="w-44 bg-step100"
      ></ion-skeleton-text>
      <ion-skeleton-text
        [animated]="true"
        class="w-36 bg-step100"
      ></ion-skeleton-text>
    </ng-container>
    <ng-template #jokeLoaded>
      <ng-container *ngIf="!!joke">
        <p>{{ joke.joke || joke.setup }}</p>
        <p *ngIf="joke.delivery">{{ joke.delivery }}</p>
      </ng-container>
    </ng-template>
  </ion-card-content>
</ion-card>
