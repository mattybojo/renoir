<ren-header
  [actions]="headerActions"
  (actionType)="actionHandler($event)"
></ren-header>
<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let todoItem of todoItems" #slidingItem>
      <ion-item button="true" (click)="onClickItem(todoItem)">
        <ion-label>
          <span class="ion-float-left"> {{ todoItem.title }} </span>
          <span class="ion-float-right" *ngIf="todoItem.dueDate">
            {{ todoItem.dueDate.toDate() | date: 'MM/dd/yy' }}
          </span>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option
          color="primary"
          (click)="updateItem(todoItem, slidingItem)"
          class="btn-item-option"
          ><ion-icon name="pencil"></ion-icon
        ></ion-item-option>
        <ion-item-option
          color="danger"
          (click)="deleteItem(todoItem)"
          class="btn-item-option"
          ><ion-icon name="trash"></ion-icon
        ></ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
