<ren-header
  [actions]="headerActions"
  (actionType)="actionHandler($event)"
></ren-header>
<ion-content>
  <ren-filter-sort
    [sortSettings]="sortSettings"
    [pickerOptions]="pickerOptions"
    [filterSettings]="filterSettings"
    [items]="todoItems"
    (exportedItems)="filteredTodoItems=$event"
  ></ren-filter-sort>
  <ion-list>
    <ion-item-sliding *ngFor="let todoItem of filteredTodoItems">
      <ion-item button (click)="updateItem(todoItem)">
        <ion-label>
          <span class="ion-float-left"> {{ todoItem.title }} </span>
          <span class="ion-float-right" *ngIf="todoItem.dueDate">
            {{ todoItem.dueDate.toDate() | date: 'MM/dd/yy' }}
          </span>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option
          color="primary"
          (click)="updateItem(todoItem)"
          class="btn-item-option"
          ><ion-icon name="pencil"></ion-icon
        ></ion-item-option>
        <ion-item-option
          color="danger"
          (click)="deleteItem(todoItem)"
          class="btn-item-option"
          ><ion-icon name="trash"></ion-icon
        ></ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
