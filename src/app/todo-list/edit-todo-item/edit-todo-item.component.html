<ren-header
  [actions]="headerActions"
  (actionType)="actionHandler($event)"
></ren-header>
<ion-content>
  <form [formGroup]="todoItemForm">
    <ion-list>
      <ion-item [class.invalid]="todoItemForm.controls.title?.invalid">
        <ion-input
          formControlName="title"
          placeholder="Title"
          autocapitalize="sentences"
          clearInput
          spellcheck
        ></ion-input>
      </ion-item>
      <ion-item>
        <ion-label class="ion-float-left">Due Date: </ion-label>
        <ion-datetime-button id="datetime-btn" datetime="datetime">
          <div slot="date-target">
            <ng-container *ngIf="currentItem?.dueDate">{{
              currentItem.dueDate.toDate() | date: "MM/dd/yy"
            }}</ng-container>
            <ng-container *ngIf="!currentItem.dueDate">N/A</ng-container>
          </div>
        </ion-datetime-button>
      </ion-item>
      <ion-item>
        <ion-label class="ion-float-left">Assigned to:</ion-label>
        <ion-select
          class="ion-float-right"
          placeholder="Assigned To?"
          formControlName="assignedTo"
          [(ngModel)]="currentItem.assignedTo"
        >
          <ion-select-option value=""></ion-select-option>
          <ion-select-option value="C">C</ion-select-option>
          <ion-select-option value="M">M</ion-select-option>
          <ion-select-option value="C+M">C+M</ion-select-option>
        </ion-select>
      </ion-item>
      <!-- Priority -->
      <ion-item>
        <ion-label class="ion-float-left">Priority:</ion-label>
        <ion-select
          class="ion-float-right"
          placeholder="Priority"
          formControlName="priority"
          [(ngModel)]="currentItem.priority"
        >
          <ion-select-option value=""></ion-select-option>
          <ion-select-option value="1">1</ion-select-option>
          <ion-select-option value="2">2</ion-select-option>
          <ion-select-option value="3">3</ion-select-option>
        </ion-select>
      </ion-item>
      <ion-item [class.invalid]="todoItemForm.controls.body?.invalid">
        <ion-textarea
          formControlName="body"
          placeholder="Note content here"
          rows="35"
          autocapitalize="sentences"
          spellcheck
        ></ion-textarea>
      </ion-item>
    </ion-list>
  </form>
</ion-content>

<ion-popover [keepContentsMounted]="true">
  <ng-template>
    <ion-datetime
      id="datetime"
      presentation="date"
      showDefaultButtons
      showClearButton
      (ionChange)="onDateChange($event)"
      [value]="dueDate?.toDate().toISOString()"
    ></ion-datetime>
  </ng-template>
</ion-popover>
